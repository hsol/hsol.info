name: Sync Submodule To Blob

on:
  push:
    branches:
      - dev
    paths:
      - hsol-info-blob
      - .gitmodules
      - scripts/sync-submodule-to-blob.mjs
      - .github/workflows/submodule-blob-sync.yml
  workflow_dispatch:

jobs:
  sync-to-blob:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SUBMODULES_PAT }}" ]; then
            echo "SUBMODULES_PAT secret is missing."
            exit 1
          fi
          if [ -z "${{ secrets.BLOB_READ_WRITE_TOKEN }}" ]; then
            echo "BLOB_READ_WRITE_TOKEN secret is missing."
            exit 1
          fi

      - name: Checkout repository with private submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync hsol-info-blob to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          BLOB_SUBMODULE_DIR: hsol-info-blob
          BLOB_PATH_PREFIX: info
          BLOB_ACCESS: private
        run: npm run sync:blob:push
