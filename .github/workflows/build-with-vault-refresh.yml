name: Build With Vault Refresh

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SUBMODULES_PAT }}" ]; then
            echo "SUBMODULES_PAT secret is missing."
            exit 1
          fi
          if [ -z "${{ secrets.BLOB_READ_WRITE_TOKEN }}" ]; then
            echo "BLOB_READ_WRITE_TOKEN secret is missing."
            exit 1
          fi

      - name: Checkout repository with private submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore vault sync cache
        uses: actions/cache@v4
        with:
          path: |
            hsol-info-blob/vault
            hsol-info-blob/.blob-sync-state.json
          key: vault-sync-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            vault-sync-${{ runner.os }}-

      - name: Refresh vault from Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          BLOB_PATH_PREFIX: info
        run: npm run sync:blob:pull -- --clean

      - name: Refresh site-data with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          ANTHROPIC_MAX_TOKENS: "64000"
        run: npm run content:refresh:claude

      - name: Upload content refresh failure dumps
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: content-refresh-failures-${{ github.run_id }}
          path: generated/content-refresh-failures/
          if-no-files-found: ignore

      - name: Generate site.ts from vault
        run: npm run content:generate:site-ts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
