name: Build With Vault Refresh

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SUBMODULES_PAT }}" ]; then
            echo "SUBMODULES_PAT secret is missing."
            exit 1
          fi

      - name: Checkout repository with private submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh site-data with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          ANTHROPIC_MAX_TOKENS: "64000"
          GIT_DIFF_BASE_SHA: ${{ github.event.before }}
          GIT_DIFF_HEAD_SHA: ${{ github.sha }}
        run: npm run content:refresh:claude

      - name: Commit and push site-data to hsol-info-blob submodule
        env:
          TOKEN: ${{ secrets.SUBMODULES_PAT }}
          # Push target on hsol-info-blob (parent pins submodule SHA; we commit on that commit then update this branch)
          SUBMODULE_BRANCH: main
        run: |
          set -euo pipefail
          SITE_FILE="vault/object-views/site-data.json"
          cd hsol-info-blob
          if git diff --quiet HEAD -- "$SITE_FILE" 2>/dev/null; then
            echo "No changes under $SITE_FILE; skip submodule push."
            exit 0
          fi
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/hsol/hsol-info-blob.git"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "$SITE_FILE"
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh site-data from hsol.info (${{ github.sha }})"
          git push origin "HEAD:refs/heads/${SUBMODULE_BRANCH}"

      - name: Upload content refresh failure dumps
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: content-refresh-failures-${{ github.run_id }}
          path: generated/content-refresh-failures/
          if-no-files-found: ignore

      - name: Generate site.ts from vault
        run: npm run content:generate:site-ts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
