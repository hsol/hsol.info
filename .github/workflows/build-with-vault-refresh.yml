name: Build With Vault Refresh

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SUBMODULES_PAT }}" ]; then
            echo "SUBMODULES_PAT secret is missing."
            exit 1
          fi

      - name: Checkout repository with private submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh site-data with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          ANTHROPIC_MAX_TOKENS: "64000"
          GIT_DIFF_BASE_SHA: ${{ github.event.before }}
          GIT_DIFF_HEAD_SHA: ${{ github.sha }}
          # 빌드 로그(build_log 테이블) 적층용. 없으면 로그 적층만 건너뛰고 리프레시는 정상.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run content:refresh:claude

      - name: Commit and push vault updates to hsol-info-blob submodule
        env:
          TOKEN: ${{ secrets.SUBMODULES_PAT }}
          # Push target on hsol-info-blob (parent pins submodule SHA; we commit on that commit then update this branch)
          SUBMODULE_BRANCH: main
        run: |
          set -euo pipefail
          SITE_FILE="vault/object-views/site-data.json"
          REF_FILE="vault/object-views/hsol-info-parent-ref.json"
          cd hsol-info-blob
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/hsol/hsol-info-blob.git"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin "${SUBMODULE_BRANCH}"
          # refresh 등으로 작업 트리가 더러우면 switch 전에 stash(미추적 ref 포함). 그렇지 않으면 checkout 거부됨.
          STASHED=0
          if [ -n "$(git status --porcelain --untracked-files=all -- "$SITE_FILE" "$REF_FILE" 2>/dev/null || true)" ]; then
            git stash push -u -m "hsol.info-ci pre-sync" -- "$SITE_FILE" "$REF_FILE"
            STASHED=1
          fi
          git switch -C ci-sync "origin/${SUBMODULE_BRANCH}"
          if [ "$STASHED" -eq 1 ]; then
            git stash pop
          fi
          mkdir -p "$(dirname "$REF_FILE")"
          jq -n \
            --arg sha "${{ github.sha }}" \
            --arg ref "${{ github.ref }}" \
            --argjson run ${{ github.run_id }} \
            --arg at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{parentSha:$sha, parentRef:$ref, workflowRunId:$run, recordedAt:$at}' > "$REF_FILE"
          git add "$SITE_FILE" "$REF_FILE"
          if git diff --cached --quiet; then
            echo "No staged vault changes; skip submodule push."
            exit 0
          fi
          git commit -m "chore: vault sync from hsol.info CI (${{ github.sha }})"
          # 동시 실행 경쟁이 있을 수 있어 rebase 후 1회 재시도
          if ! git push origin "HEAD:refs/heads/${SUBMODULE_BRANCH}"; then
            git fetch origin "${SUBMODULE_BRANCH}"
            git rebase "origin/${SUBMODULE_BRANCH}"
            git push origin "HEAD:refs/heads/${SUBMODULE_BRANCH}"
          fi

      - name: Upload content refresh failure dumps
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: content-refresh-failures-${{ github.run_id }}
          path: generated/content-refresh-failures/
          if-no-files-found: ignore

      - name: Generate site.ts from vault
        run: npm run content:generate:site-ts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
