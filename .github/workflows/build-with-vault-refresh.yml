name: Build With Vault Refresh

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SUBMODULES_PAT }}" ]; then
            echo "SUBMODULES_PAT secret is missing."
            exit 1
          fi

      - name: Checkout repository with private submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}
          # vault 변경 감지(부모 BASE 커밋의 서브모듈 포인터 비교)를 위해 전체 히스토리 필요.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync hsol-info-blob to latest origin/main
        # 부모 repo의 서브모듈 pin(gitlink)은 이 워크플로가 자동으로 올리지 않고 한솔님이 수동으로만
        # 갱신한다(chore(submodule): ... 포인터 갱신 커밋). 그래서 체크아웃 직후 상태는 종종 오래된
        # onepager-ko.html 스냅샷(또는 그 파일이 아예 없던 시점)을 가리킨다.
        # 원페이저 빌더(getExistingOnePagerHtml)는 이 로컬 파일을 "기존 버전 유무" 판단 기준으로 쓰므로,
        # pin 이 stale 하면 항상 hasCurrent=false 로 읽혀 mode 가 매번 NEW 로 찍히고, 그 사이 origin/main
        # 에 쌓인 PATCH/OVERHAUL 개선분이 통째로 덮어써진다. 여기서 로컬 체크아웃만 origin/main 최신으로
        # 맞춰 읽기 문제를 해소한다(부모 repo 의 pin 커밋 자체는 건드리지 않음 — vault change 감지는
        # 부모 히스토리의 gitlink 비교로 별도 동작하므로 영향 없음).
        run: |
          cd hsol-info-blob
          git fetch origin main
          git checkout origin/main

      - name: Refresh site-data with Claude
        env:
          # Vercel AI Gateway 경유(직접 Anthropic 호출 없음). CI엔 OIDC가 없으므로 키 필수.
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          AI_GATEWAY_MODEL: anthropic/claude-opus-4.7
          ANTHROPIC_MAX_TOKENS: "64000"
          GIT_DIFF_BASE_SHA: ${{ github.event.before }}
          GIT_DIFF_HEAD_SHA: ${{ github.sha }}
          # vault(서브모듈) 수정이 있을 때만 자동 실행. 수동 실행(workflow_dispatch)은 명시적 의도라 강제.
          CONTENT_REFRESH_FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
          # 빌드 로그(build_log 테이블) 적층용. 없으면 로그 적층만 건너뛰고 리프레시는 정상.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # 파이프라인 종류별 LLM 동작 토글(contentPipeline). 없으면 코드 기본값으로 폴백(빌드 정상).
          # → 대시보드 Edge Config 에서 불리언만 바꾸면 다음 빌드가 반영. GitHub secret 로 등록 필요.
          EDGE_CONFIG: ${{ secrets.EDGE_CONFIG }}
        run: npm run content:refresh:claude

      - name: Commit and push vault updates to hsol-info-blob submodule
        env:
          TOKEN: ${{ secrets.SUBMODULES_PAT }}
          # Push target on hsol-info-blob (parent pins submodule SHA; we commit on that commit then update this branch)
          SUBMODULE_BRANCH: main
        run: |
          set -euo pipefail
          SITE_FILE="vault/object-views/site-data.json"
          REF_FILE="vault/object-views/hsol-info-parent-ref.json"
          ONEPAGER_FILE="vault/object-views/onepager-ko.html"
          cd hsol-info-blob
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/hsol/hsol-info-blob.git"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin "${SUBMODULE_BRANCH}"
          # refresh 가 '실제로 바꾼' 생성물만 임시 백업한다(미변경 파일은 origin/main 것을 보존).
          # stash/pop 은 onepager 가 main 에선 추적·여기선 미추적이라 'already exists'로 충돌하므로 백업 방식으로 회피.
          TMP="$(mktemp -d)"
          CHANGED=""
          for f in "$SITE_FILE" "$ONEPAGER_FILE"; do
            if [ -n "$(git status --porcelain --untracked-files=all -- "$f" 2>/dev/null || true)" ]; then
              install -D "$f" "$TMP/$f"
              CHANGED="$CHANGED $f"
            fi
          done
          # 작업 트리를 깨끗이 한 뒤 origin/main 으로 전환(추적 변경 되돌리기 + 미추적 생성물 제거).
          git checkout -- . 2>/dev/null || true
          git clean -fd vault/object-views 2>/dev/null || true
          git switch -C ci-sync "origin/${SUBMODULE_BRANCH}"
          # 백업한 생성물을 origin/main 위에 덮어쓴다.
          for f in $CHANGED; do
            install -D "$TMP/$f" "$f"
          done
          mkdir -p "$(dirname "$REF_FILE")"
          jq -n \
            --arg sha "${{ github.sha }}" \
            --arg ref "${{ github.ref }}" \
            --argjson run ${{ github.run_id }} \
            --arg at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{parentSha:$sha, parentRef:$ref, workflowRunId:$run, recordedAt:$at}' > "$REF_FILE"
          git add "$REF_FILE"
          for f in $CHANGED; do git add "$f"; done
          if git diff --cached --quiet; then
            echo "No staged vault changes; skip submodule push."
            exit 0
          fi
          git commit -m "chore: vault sync from hsol.info CI (${{ github.sha }})"
          # 동시 실행 경쟁이 있을 수 있어 rebase 후 1회 재시도
          if ! git push origin "HEAD:refs/heads/${SUBMODULE_BRANCH}"; then
            git fetch origin "${SUBMODULE_BRANCH}"
            git rebase "origin/${SUBMODULE_BRANCH}"
            git push origin "HEAD:refs/heads/${SUBMODULE_BRANCH}"
          fi

      - name: Upload content refresh failure dumps
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: content-refresh-failures-${{ github.run_id }}
          path: generated/content-refresh-failures/
          if-no-files-found: ignore

      - name: Generate site.ts from vault
        run: npm run content:generate:site-ts

      - name: Generate one-pager PDF (html -> pdf -> Blob)
        env:
          # 없으면 로컬 PDF만 만들고 업로드는 graceful skip(빌드 실패 안 함).
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npx playwright install --with-deps chromium
          # PDF 한글 깨짐 방지용 CJK 폰트.
          sudo apt-get install -y fonts-noto-cjk
          npm run content:generate:onepager-pdf

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
